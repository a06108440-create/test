<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoMeta Pro</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      background: white;
      border-radius: 0;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #667eea;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: #667eea;
      border-radius: 2px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
      transition: border-color 0.3s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: background-color 0.3s;
    }

    .checkbox-item:hover {
      background-color: #f5f5f5;
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .checkbox-item label {
      cursor: pointer;
      font-size: 14px;
      flex: 1;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 5px;
      color: #666;
    }

    .input-group input[type="number"],
    .input-group input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: white;
      color: #667eea;
      border: 2px solid #667eea;
    }

    .btn-secondary:hover {
      background: #f5f5f5;
    }

    .btn-danger {
      background: #ff4757;
      color: white;
    }

    .btn-danger:hover {
      background: #ff3838;
    }

    .status {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .stat-card {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }

    .toggle-switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .toggle-switch label {
      font-size: 14px;
      font-weight: 500;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 26px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #667eea;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .queue-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px;
    }

    .queue-item {
      padding: 8px;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .queue-item-prompt {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-item-remove {
      background: #ff4757;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .tabs {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 20px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎨 AutoMeta Pro</h1>
      <p>Automated Image & Video Generation</p>
    </div>

    <div class="content">
      <div class="tabs">
        <button class="tab active" data-tab="generate">Generate</button>
        <button class="tab" data-tab="queue">Queue</button>
        <button class="tab" data-tab="settings">Settings</button>
      </div>

      <!-- Generate Tab -->
      <div class="tab-content active" id="generate-tab">
        <div class="section">
          <div class="section-title">Image Prompt</div>
          <textarea id="imagePrompt" rows="4" placeholder="Enter your image prompt here..."></textarea>
        </div>

        <div class="section">
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="autoGenerateVideo">
              <label for="autoGenerateVideo">Auto-generate video from image</label>
            </div>
          </div>
        </div>

        <div class="section" id="videoPromptSection" style="display: none;">
          <div class="section-title">Video Prompt (Optional)</div>
          <textarea id="videoPrompt" rows="3" placeholder="Leave empty to use image prompt or enter custom video prompt..."></textarea>
        </div>

        <div class="button-group">
          <button class="btn-primary" id="generateBtn">🚀 Generate</button>
          <button class="btn-secondary" id="addToQueueBtn">➕ Add to Queue</button>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-value" id="imagesGenerated">0</div>
            <div class="stat-label">Images Generated</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="videosGenerated">0</div>
            <div class="stat-label">Videos Generated</div>
          </div>
        </div>
      </div>

      <!-- Queue Tab -->
      <div class="tab-content" id="queue-tab">
        <div class="section">
          <div class="section-title">Generation Queue</div>
          <div class="queue-list" id="queueList">
            <p style="text-align: center; color: #999; padding: 20px;">No items in queue</p>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-primary" id="processQueueBtn">▶️ Process Queue</button>
          <button class="btn-danger" id="clearQueueBtn">🗑️ Clear Queue</button>
        </div>

        <div class="input-group">
          <label>Queue Processing Delay (seconds)</label>
          <input type="number" id="queueDelay" min="5" max="60" value="10">
        </div>
      </div>

      <!-- Settings Tab -->
      <div class="tab-content" id="settings-tab">
        <div class="section">
          <div class="section-title">Generation Settings</div>
          
          <div class="toggle-switch">
            <label>Auto-click Generate Button</label>
            <label class="switch">
              <input type="checkbox" id="autoClickGenerate" checked>
              <span class="slider"></span>
            </label>
          </div>

          <div class="toggle-switch">
            <label>Auto-download Results</label>
            <label class="switch">
              <input type="checkbox" id="autoDownload">
              <span class="slider"></span>
            </label>
          </div>

          <div class="toggle-switch">
            <label>Show Notifications</label>
            <label class="switch">
              <input type="checkbox" id="showNotifications" checked>
              <span class="slider"></span>
            </label>
          </div>

          <div class="input-group">
            <label>Wait Time After Image (seconds)</label>
            <input type="number" id="imageWaitTime" min="3" max="30" value="5">
          </div>

          <div class="input-group">
            <label>Wait Time After Video (seconds)</label>
            <input type="number" id="videoWaitTime" min="5" max="60" value="10">
          </div>

          <div class="input-group">
            <label>Max Retry Attempts</label>
            <input type="number" id="maxRetries" min="1" max="10" value="3">
          </div>
        </div>

        <div class="section">
          <div class="section-title">Prompt Templates</div>
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="addImagePrefix">
              <label for="addImagePrefix">Add "imagine" prefix to image prompts</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="addVideoPrefix">
              <label for="addVideoPrefix">Add "animate" prefix to video prompts</label>
            </div>
          </div>
        </div>

        <div class="button-group">
          <button class="btn-primary" id="saveSettingsBtn">💾 Save Settings</button>
          <button class="btn-secondary" id="resetSettingsBtn">🔄 Reset</button>
        </div>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
